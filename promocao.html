<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Allvino - Promoções</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,300;0,700&family=Manrope:wght@400;700&display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { background-color: #FDFBF7; scroll-behavior: smooth; font-family: 'Manrope', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">
    <header class="bg-white/90 backdrop-blur-md sticky top-0 z-40 border-b border-stone-100 flex justify-between items-center w-full px-5 py-4">
        <a href="catalogo.html" class="p-1 flex items-center justify-center hover:bg-stone-100 rounded-full transition"><span class="material-symbols-outlined text-black">arrow_back</span></a>
        <div class="h-10 flex items-center justify-center"><img src="LOGO-ALLVINO-PRETO.png" alt="Allvino" class="h-full w-auto object-contain scale-150 transform origin-center"></div>
        <button onclick="toggleCart()" class="relative p-1">
            <span class="material-symbols-outlined text-black">shopping_bag</span>
            <span id="cart-badge" class="absolute -top-1 -right-1 bg-[#B91C1C] text-white text-[10px] rounded-full w-4 h-4 flex items-center justify-center font-bold hidden border border-white">0</span>
        </button>
    </header>

    <main class="max-w-3xl mx-auto px-5 pt-6 space-y-8">
        
        <div class="text-center space-y-2 mb-8">
            <h1 class="text-3xl font-bold font-serif text-black">Ofertas e Kits</h1>
            <p class="text-stone-500 text-sm">Seleções exclusivas criadas para você.</p>
        </div>

        <div id="lista-promocoes" class="space-y-8">
            <p class="text-center py-12 animate-pulse font-bold text-stone-400">Buscando ofertas...</p>
        </div>

    </main>

    <div id="cart-overlay" class="fixed inset-0 z-[60] flex justify-end hidden opacity-0 transition-all duration-300">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="toggleCart()"></div>
        <div id="cart-panel" class="relative w-full max-w-md h-full bg-white flex flex-col transform translate-x-full transition-transform duration-300 ease-out shadow-2xl">
            <div class="p-6 border-b flex justify-between items-center"><h2 class="text-xl font-bold">Sua Seleção</h2><button onclick="toggleCart()" class="p-2 hover:bg-stone-100 rounded-full transition"><span class="material-symbols-outlined">close</span></button></div>
            <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4 no-scrollbar"></div>
            <div class="p-6 bg-stone-50 border-t space-y-4">
                <label class="flex items-center justify-between p-4 bg-white rounded-2xl border border-stone-200 cursor-pointer"><div class="flex items-center gap-3"><input type="checkbox" id="retirada" onchange="renderCart()" class="text-[#B91C1C] rounded focus:ring-0"> <span class="font-bold text-sm">Retirada na Loja</span></div><span class="text-xs font-bold text-green-600">-10% OFF</span></label>
                <div class="flex justify-between text-xl font-bold"><span>Total</span> <span id="cart-total">R$ 0,00</span></div>
                <button onclick="location.href='checkout.html'" class="w-full bg-[#B91C1C] text-white py-4 rounded-2xl font-bold shadow-lg shadow-red-900/20 active:scale-95 transition">Ir para Pagamento</button>
            </div>
        </div>
    </div>
    
    <nav class="bg-white/90 backdrop-blur-md fixed bottom-0 left-0 w-full z-40 rounded-t-2xl border-t border-stone-100 shadow-[0_-10px_30px_rgba(0,0,0,0.04)] flex justify-around items-center px-6 pb-6 pt-3">
        <a class="flex flex-col items-center text-stone-400 hover:text-black transition-colors" href="index.html"><span class="material-symbols-outlined">home</span><span class="text-[10px] uppercase tracking-tighter mt-1 font-bold">Início</span></a>
        <a class="flex flex-col items-center text-[#B91C1C] font-bold" href="catalogo.html"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">apps</span><span class="text-[10px] uppercase tracking-tighter mt-1">Catálogo</span></a>
        <a class="flex flex-col items-center text-stone-400 hover:text-black transition-colors" href="login.html"><span class="material-symbols-outlined">person</span><span class="text-[10px] uppercase tracking-tighter mt-1 font-bold">Conta</span></a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://jfgtafnfuqlysdnvsbhk.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpmZ3RhZm5mdXFseXNkbnZzYmhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDY1NzgsImV4cCI6MjA5MjcyMjU3OH0.mZDnR1A8VIJVUzedb7GU1db628dSqU-8SdvBFXXVaE4';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function carregarKitsPromocionais() {
            const container = document.getElementById('lista-promocoes');
            
            // Busca apenas promoções ativas e do tipo "Kit"
            const { data, error } = await supabaseClient
                .from('promocoes')
                .select('*')
                .eq('status', true)
                .eq('tipo_oferta', 'Kit')
                .order('criado_em', { ascending: false });

            if (error || !data || data.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <span class="material-symbols-outlined text-6xl text-stone-300 mb-4">inventory_2</span>
                        <h3 class="text-xl font-bold text-stone-500">Nenhum kit no momento</h3>
                        <p class="text-stone-400 text-sm mt-2">Nossas ofertas esgotaram. Volte em breve!</p>
                    </div>`;
                return;
            }

            container.innerHTML = '';
            
            data.forEach(kit => {
                // Preço de exibição
                const precoFormatado = kit.preco ? kit.preco.toFixed(2).replace('.', ',') : '0,00';
                
                // Card seguindo o seu design
                container.innerHTML += `
                    <div class="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-stone-100 group">
                        <div class="h-64 w-full relative overflow-hidden bg-stone-100">
                            <img src="${kit.imagem_url}" alt="${kit.titulo}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                        </div>
                        <div class="p-6 md:p-8 space-y-4">
                            <h2 class="text-2xl md:text-3xl font-bold font-serif text-black">${kit.titulo}</h2>
                            <p class="text-stone-500 text-sm md:text-base">${kit.subtitulo}</p>
                            
                            <div class="bg-[#F8F8F8] rounded-2xl p-5 mt-6 flex justify-between items-center flex-wrap gap-4">
                                <div>
                                    <p class="text-3xl font-bold text-black">R$ ${precoFormatado}</p>
                                    <p class="text-xs font-bold text-green-600 mt-1 uppercase tracking-widest">Oferta Especial</p>
                                </div>
                                <button onclick="addToCart('${kit.titulo}', ${kit.preco}, '${kit.imagem_url}')" class="bg-[#B91C1C] text-white px-8 py-4 rounded-xl font-bold text-sm uppercase tracking-widest shadow-lg shadow-red-900/20 hover:bg-red-800 active:scale-95 transition-all w-full md:w-auto text-center">
                                    Adicionar Kit
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // --- SISTEMA DE CARRINHO (Sincronizado) ---
        let cart = JSON.parse(localStorage.getItem('allvino_cart')) || [];
        
        function toggleCart() { 
            const o = document.getElementById('cart-overlay'), p = document.getElementById('cart-panel'); 
            if(o.classList.contains('hidden')){ o.classList.remove('hidden'); setTimeout(()=>{ o.classList.remove('opacity-0'); p.classList.remove('translate-x-full'); },10); } 
            else { o.classList.add('opacity-0'); p.classList.add('translate-x-full'); setTimeout(()=>o.classList.add('hidden'),300); } 
            renderCart(); 
        }

        function addToCart(nome, preco, img) { 
            const item = cart.find(x => x.nome === nome); 
            if(item) item.qtd++; else cart.push({nome: nome, preco: preco, img: img, qtd: 1}); 
            localStorage.setItem('allvino_cart', JSON.stringify(cart)); 
            atualizarBadge();
            alert("Kit adicionado ao carrinho!"); 
        }

        function renderCart() { 
            const cont = document.getElementById('cart-items'); 
            cont.innerHTML = ''; 
            let sub = 0; 
            cart.forEach((x, i) => { 
                sub += x.preco * x.qtd; 
                cont.innerHTML += `<div class="flex gap-4 items-center border-b pb-4"><img src="${x.img}" class="w-16 h-20 object-contain mix-blend-multiply"><div class="flex-1"><p class="font-bold text-sm">${x.nome}</p><p class="text-xs text-stone-400">R$ ${x.preco.toFixed(2).replace('.', ',')}</p></div><div class="flex items-center gap-2"><button onclick="changeQty(${i},-1)" class="w-6 h-6 border rounded font-bold hover:bg-stone-100">-</button><span class="text-xs font-bold w-4 text-center">${x.qtd}</span><button onclick="changeQty(${i},1)" class="w-6 h-6 border rounded font-bold hover:bg-stone-100">+</button></div></div>`; 
            }); 
            const desc = document.getElementById('retirada').checked ? sub * 0.10 : 0; 
            document.getElementById('cart-total').innerText = `R$ ${(sub - desc).toFixed(2).replace('.', ',')}`; 
        }

        function changeQty(i, d) { 
            cart[i].qtd += d; 
            if(cart[i].qtd <= 0) cart.splice(i,1); 
            localStorage.setItem('allvino_cart', JSON.stringify(cart)); 
            renderCart(); 
            atualizarBadge();
        }

        function atualizarBadge() {
            const qtd = cart.reduce((a,b)=>a+b.qtd,0); 
            const badge = document.getElementById('cart-badge');
            if(qtd > 0) { badge.innerText = qtd; badge.classList.remove('hidden'); } 
            else { badge.classList.add('hidden'); }
        }

        // Inicia a página
        document.addEventListener("DOMContentLoaded", () => { 
            atualizarBadge();
            carregarKitsPromocionais(); 
        });
    </script>
</body>
</html>
