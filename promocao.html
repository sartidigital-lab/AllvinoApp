<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Allvino - Promoções</title>

    <!-- Configurações do Ícone e Aplicativo (PWA) -->
    <link rel="manifest" href="manifest-v4.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png?v=4">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,300;0,700&family=Manrope:wght@400;700&display=swap" rel="stylesheet"/>
    <style>.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; } body { background-color: #FDFBF7; scroll-behavior: smooth; font-family: 'Manrope', sans-serif; } .no-scrollbar::-webkit-scrollbar { display: none; }</style>
</head>
<body class="pb-24">
    <header class="bg-white/90 backdrop-blur-md sticky top-0 z-40 border-b border-stone-100 flex justify-between items-center w-full px-5 py-4">
        
        <!-- Seta SVG nativa (não buga e não exibe a palavra arrow_back) -->
        <a href="catalogo.html" class="p-1 flex items-center justify-center hover:bg-stone-100 rounded-full transition">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 text-black">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
            </svg>
        </a>
        
        <!-- Logo Clicável -->
        <a href="catalogo.html" class="h-10 flex items-center justify-center">
            <img src="LOGO-ALLVINO-PRETO.png" alt="Allvino" class="h-full w-auto object-contain scale-150 transform origin-center">
        </a>
        
        <button onclick="toggleCart()" class="relative p-1"><span class="material-symbols-outlined text-black">shopping_bag</span><span id="cart-badge" class="absolute -top-1 -right-1 bg-[#B91C1C] text-white text-[10px] rounded-full w-4 h-4 flex items-center justify-center font-bold hidden border border-white">0</span></button>
    </header>

    <main class="max-w-4xl mx-auto px-5 pt-6">
        <div id="topo-promo" class="mb-8"></div>
        <div id="lista-promocoes" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <p class="col-span-full text-center py-12 animate-pulse font-bold text-stone-400">Buscando ofertas...</p>
        </div>
    </main>

    <div id="cart-overlay" class="fixed inset-0 z-[60] flex justify-end hidden opacity-0 transition-all duration-300"><div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="toggleCart()"></div><div id="cart-panel" class="relative w-full max-w-md h-full bg-white flex flex-col transform translate-x-full transition-transform duration-300 ease-out shadow-2xl"><div class="p-6 border-b flex justify-between items-center"><h2 class="text-xl font-bold">Sua Seleção</h2><button onclick="toggleCart()" class="p-2 hover:bg-stone-100 rounded-full transition"><span class="material-symbols-outlined">close</span></button></div><div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4 no-scrollbar"></div><div class="p-6 bg-stone-50 border-t space-y-4"><label class="flex items-center justify-between p-4 bg-white rounded-2xl border border-stone-200 cursor-pointer"><div class="flex items-center gap-3"><input type="checkbox" id="retirada" onchange="renderCart()" class="text-[#B91C1C] rounded focus:ring-0"> <span class="font-bold text-sm">Retirada na Loja</span></div><span class="text-xs font-bold text-green-600">-10% OFF</span></label><div class="flex justify-between text-xl font-bold"><span>Total</span> <span id="cart-total">R$ 0,00</span></div><button onclick="location.href='checkout.html'" class="w-full bg-[#B91C1C] text-white py-4 rounded-2xl font-bold shadow-lg shadow-red-900/20 active:scale-95 transition">Ir para Pagamento</button></div></div></div>
    
    <!-- MENU INFERIOR ATUALIZADO -->
    <nav class="bg-white/90 backdrop-blur-md fixed bottom-0 left-0 w-full z-40 rounded-t-2xl border-t border-stone-100 shadow-[0_-10px_30px_rgba(0,0,0,0.04)] flex justify-around items-center px-6 pb-6 pt-3">
        <a class="flex flex-col items-center text-stone-400 hover:text-black transition-colors" href="index.html">
            <span class="material-symbols-outlined">home</span>
            <span class="text-[10px] uppercase tracking-tighter mt-1 font-bold">Início</span>
        </a>
        <a class="flex flex-col items-center text-[#B91C1C] font-bold" href="catalogo.html">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">apps</span>
            <span class="text-[10px] uppercase tracking-tighter mt-1">Catálogo</span>
        </a>
        <!-- LINK DA CONTA CORRIGIDO AQUI -->
        <a class="flex flex-col items-center text-stone-400 hover:text-black transition-colors" href="conta.html">
            <span class="material-symbols-outlined">person</span>
            <span class="text-[10px] uppercase tracking-tighter mt-1 font-bold">Conta</span>
        </a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://jfgtafnfuqlysdnvsbhk.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpmZ3RhZm5mdXFseXNkbnZzYmhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDY1NzgsImV4cCI6MjA5MjcyMjU3OH0.mZDnR1A8VIJVUzedb7GU1db628dSqU-8SdvBFXXVaE4';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function carregarPaginaPromocoes() {
            const { data: bannerData } = await supabaseClient.from('promocoes').select('*').eq('status', true).eq('tipo_oferta', 'Banner').order('criado_em', { ascending: false }).limit(1);
            if (bannerData && bannerData.length > 0) {
                const b = bannerData[0];
                const badgeHtml = b.badge_texto ? `<span class="text-[10px] text-white uppercase tracking-widest bg-white/20 px-3 py-1 rounded-full backdrop-blur-sm">${b.badge_texto}</span>` : '';
                const tituloHtml = b.titulo ? `<h1 class="text-3xl md:text-4xl text-white font-bold font-serif">${b.titulo}</h1>` : '';
                const subHtml = b.subtitulo ? `<p class="text-white/80 text-sm max-w-md mx-auto">${b.subtitulo}</p>` : '';
                
                const imgDesktop = b.imagem_url;
                const imgMobile = b.imagem_mobile_url || b.imagem_url;

                document.getElementById('topo-promo').innerHTML = `
                    <div class="relative overflow-hidden rounded-3xl bg-black h-[250px] flex flex-col justify-center items-center text-center p-8 shadow-lg">
                        <picture class="absolute inset-0 w-full h-full">
                            <source media="(min-width: 768px)" srcset="${imgDesktop}">
                            <img src="${imgMobile}" class="w-full h-full object-cover opacity-50" alt="${b.titulo || 'Oferta Especial'}">
                        </picture>
                        <div class="relative z-10 space-y-2">
                            ${badgeHtml}
                            ${tituloHtml}
                            ${subHtml}
                        </div>
                    </div>`;
            }

            const { data: produtosData, error } = await supabaseClient.from('promocoes').select('*').eq('status', true).neq('tipo_oferta', 'Banner').order('criado_em', { ascending: false });
            const container = document.getElementById('lista-promocoes');

            if (error || !produtosData || produtosData.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-12"><span class="material-symbols-outlined text-6xl text-stone-300 mb-4">inventory_2</span><h3 class="text-xl font-bold text-stone-500">Nenhuma oferta no momento</h3></div>`;
                return;
            }

            container.innerHTML = '';
            
            produtosData.forEach(kit => {
                const imgClass = 'h-full w-full object-contain mix-blend-multiply p-6';
                const bgClass = 'bg-stone-50';

                container.innerHTML += `
                    <div class="bg-white p-4 rounded-3xl shadow-sm border border-[#B91C1C]/20 flex flex-col h-full hover:shadow-md transition-shadow relative">
                        <div class="absolute -top-3 left-6 z-10"><span class="bg-[#B91C1C] text-white text-[10px] font-bold px-3 py-1 rounded uppercase tracking-widest shadow-sm">Oferta</span></div>
                        <div class="aspect-[3/4] ${bgClass} rounded-2xl flex items-center justify-center mb-4 relative overflow-hidden group">
                            <img src="${kit.imagem_url}" class="${imgClass} group-hover:scale-105 transition-transform duration-500" alt="${kit.titulo || 'Oferta'}">
                        </div>
                        <h3 class="font-bold text-xl line-clamp-2">${kit.titulo || 'Produto Especial'}</h3>
                        <p class="text-xs text-stone-400 mt-1 line-clamp-2">${kit.subtitulo || ''}</p>
                        <div class="flex justify-between items-end mt-auto pt-5">
                            <span class="text-2xl font-bold text-[#B91C1C]">R$ ${kit.preco.toFixed(2).replace('.', ',')}</span>
                            <button onclick="addToCart('${kit.titulo || 'Produto Especial'}', ${kit.preco}, '${kit.imagem_url}')" class="bg-black text-white px-4 py-3 rounded-2xl active:scale-90 transition hover:bg-stone-800 shadow-sm font-bold text-sm flex items-center gap-2">
                                Adicionar <span class="material-symbols-outlined text-[18px]">shopping_cart</span>
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        let cart = JSON.parse(localStorage.getItem('allvino_cart')) || [];
        function toggleCart() { const o = document.getElementById('cart-overlay'), p = document.getElementById('cart-panel'); if(o.classList.contains('hidden')){ o.classList.remove('hidden'); setTimeout(()=>{ o.classList.remove('opacity-0'); p.classList.remove('translate-x-full'); },10); } else { o.classList.add('opacity-0'); p.classList.add('translate-x-full'); setTimeout(()=>o.classList.add('hidden'),300); } renderCart(); }
        function addToCart(n, p, i) { const item = cart.find(x => x.nome === n); if(item) item.qtd++; else cart.push({nome:n, preco:p, img:i, qtd:1}); atualizarStorageERender(); alert("Item adicionado ao carrinho!"); }
        
        function renderCart() { 
            const cont = document.getElementById('cart-items'); cont.innerHTML = ''; let sub = 0; 
            cart.forEach((x, i) => { 
                sub += x.preco * x.qtd; 
                cont.innerHTML += `
                    <div class="flex gap-4 items-center border-b pb-4">
                        <img src="${x.img}" class="w-16 h-20 object-contain mix-blend-multiply">
                        <div class="flex-1">
                            <p class="font-bold text-sm">${x.nome}</p>
                            <p class="text-xs text-stone-400">R$ ${x.preco.toFixed(2).replace('.', ',')}</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="changeQty(${i},-1)" class="w-6 h-6 border rounded font-bold hover:bg-stone-100">-</button>
                            <span class="text-xs font-bold w-4 text-center">${x.qtd}</span>
                            <button onclick="changeQty(${i},1)" class="w-6 h-6 border rounded font-bold hover:bg-stone-100">+</button>
                            <button onclick="removerItemCart(${i})" class="text-stone-300 hover:text-red-500 ml-1" title="Remover">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" /></svg>
                            </button>
                        </div>
                    </div>`; 
            }); 
            const desc = document.getElementById('retirada').checked ? sub * 0.10 : 0; document.getElementById('cart-total').innerText = `R$ ${(sub - desc).toFixed(2).replace('.', ',')}`; 
        }
        
        function changeQty(i, d) { cart[i].qtd += d; if(cart[i].qtd <= 0) cart.splice(i,1); atualizarStorageERender(); }
        function removerItemCart(i) { cart.splice(i, 1); atualizarStorageERender(); }
        function atualizarStorageERender() { localStorage.setItem('allvino_cart', JSON.stringify(cart)); renderCart(); const qtd = cart.reduce((a,b)=>a+b.qtd,0); const badge = document.getElementById('cart-badge'); if(qtd > 0) { badge.innerText = qtd; badge.classList.remove('hidden'); } else { badge.classList.add('hidden'); } }

        document.addEventListener("DOMContentLoaded", () => { atualizarStorageERender(); carregarPaginaPromocoes(); });
    </script>
</body>
</html>
