<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Allvino - Checkout</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,300;0,700&family=Manrope:wght@400;700&display=swap" rel="stylesheet"/>
    <style> .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; } body { background-color: #FDFBF7; font-family: 'Manrope', sans-serif; } </style>
</head>
<body class="pb-24 transition-opacity duration-300 opacity-0" id="checkout-body">
    <header class="bg-white/90 backdrop-blur-md sticky top-0 z-40 border-b border-stone-100 flex justify-between items-center w-full px-5 py-4">
        <a href="catalogo.html" class="p-1"><span class="material-symbols-outlined text-black">arrow_back</span></a>
        <div class="h-10 flex items-center justify-center">
            <img src="LOGO-ALLVINO-PRETO.png" alt="Allvino" class="h-full w-auto object-contain scale-150 transform origin-center">
        </div>
        <div class="w-8"></div>
    </header>

    <main class="max-w-xl mx-auto px-5 pt-8 space-y-8">
        <div class="space-y-2">
            <h1 class="text-3xl font-bold font-serif text-black text-center">Finalizar Pedido</h1>
            <p class="text-stone-500 text-sm text-center">Confirme os seus dados para enviarmos o pedido.</p>
        </div>

        <div class="bg-white rounded-3xl p-6 border border-stone-100 shadow-sm space-y-4">
            <h2 class="text-xs font-bold text-stone-400 uppercase tracking-widest border-b pb-2">Seus Itens</h2>
            <div id="checkout-items" class="space-y-3"></div>
            <div class="border-t pt-4 space-y-2">
                <div class="flex justify-between text-sm text-stone-500"><span>Subtotal</span> <span id="subtotal">R$ 0,00</span></div>
                <div id="desconto-container" class="flex justify-between text-sm text-green-600 hidden"><span>Desconto Retirada (10%)</span> <span id="desconto">- R$ 0,00</span></div>
                <div class="flex justify-between text-xl font-bold pt-2"><span>Total</span> <span id="total">R$ 0,00</span></div>
            </div>
        </div>

        <div class="bg-white rounded-3xl p-6 border border-stone-100 shadow-sm space-y-5">
            <h2 class="text-xs font-bold text-stone-400 uppercase tracking-widest border-b pb-2">Seus Dados</h2>
            <div class="grid grid-cols-1 gap-4">
                <div><label class="text-[10px] font-bold text-stone-400 uppercase tracking-widest ml-1">Nome</label><input type="text" id="user-name" readonly class="w-full border-stone-200 bg-stone-50 rounded-xl text-sm font-bold text-stone-500 mt-1 focus:ring-0"></div>
                <div><label class="text-[10px] font-bold text-stone-400 uppercase tracking-widest ml-1">WhatsApp</label><input type="text" id="user-phone" readonly class="w-full border-stone-200 bg-stone-50 rounded-xl text-sm font-bold text-stone-500 mt-1 focus:ring-0"></div>
            </div>
        </div>

        <div class="space-y-4">
            <div class="bg-white rounded-3xl p-6 border border-stone-100 shadow-sm space-y-5">
                <h2 class="text-xs font-bold text-stone-400 uppercase tracking-widest border-b pb-2">Entrega</h2>
                <div class="space-y-3">
                    <label class="flex items-center gap-3 p-4 border rounded-2xl border-stone-200 cursor-pointer has-[:checked]:border-black has-[:checked]:bg-stone-50 transition"><input type="radio" name="entrega" value="entrega" checked onchange="toggleEndereco(true)" class="text-black focus:ring-0"><div class="flex-1 text-sm font-bold">Entrega no Endereço</div></label>
                    <label class="flex items-center gap-3 p-4 border rounded-2xl border-stone-200 cursor-pointer has-[:checked]:border-black has-[:checked]:bg-stone-50 transition"><input type="radio" name="entrega" value="retirada" onchange="toggleEndereco(false)" class="text-black focus:ring-0"><div class="flex-1 text-sm font-bold">Retirada na Loja <span class="text-green-600 text-[10px] ml-2">10% OFF</span></div></label>
                </div>
                <div id="endereco-container" class="space-y-3"><textarea id="endereco" placeholder="Rua, número, bairro e cidade para entrega..." class="w-full border-stone-200 rounded-2xl p-4 text-sm outline-none focus:border-black transition-colors" rows="3"></textarea></div>
            </div>
            <div class="bg-white rounded-3xl p-6 border border-stone-100 shadow-sm space-y-5">
                <h2 class="text-xs font-bold text-stone-400 uppercase tracking-widest border-b pb-2">Pagamento</h2>
                <select id="pagamento" class="w-full border-stone-200 rounded-2xl p-4 text-sm outline-none focus:border-black transition-colors font-bold"><option value="Pix">Pix (Rápido e Seguro)</option><option value="Cartão (Link)">Cartão de Crédito (Link de Pagamento)</option><option value="Cartão (Maquininha)">Cartão (Levar maquininha)</option></select>
            </div>
        </div>

        <button onclick="finalizarPedido()" class="w-full bg-[#B91C1C] text-white py-5 rounded-3xl font-bold text-lg shadow-xl shadow-red-900/20 active:scale-95 transition-transform flex items-center justify-center gap-3">
            <span class="material-symbols-outlined">send</span> ENVIAR PEDIDO
        </button>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://jfgtafnfuqlysdnvsbhk.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpmZ3RhZm5mdXFseXNkbnZzYmhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDY1NzgsImV4cCI6MjA5MjcyMjU3OH0.mZDnR1A8VIJVUzedb7GU1db628dSqU-8SdvBFXXVaE4';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        let cart = JSON.parse(localStorage.getItem('allvino_cart')) || [];

        async function initCheckout() {
            // Utilizamos getUser() em vez de getSession() para validar diretamente no servidor
            const { data: { user }, error } = await supabaseClient.auth.getUser();
            
            if (error || !user) { 
                window.location.replace('login.html'); 
                return; 
            }
            
            document.getElementById('checkout-body').style.opacity = '1';
            
            const userData = user.user_metadata || {};
            document.getElementById('user-name').value = userData.nome_completo || user.email.split('@')[0] || '';
            document.getElementById('user-phone').value = userData.telefone || 'Não informado';
            
            renderItems();
        }

        function renderItems() {
            const cont = document.getElementById('checkout-items'); let sub = 0; cont.innerHTML = '';
            if(cart.length === 0) { cont.innerHTML = '<p class="text-center py-4 text-stone-400">O seu carrinho está vazio.</p>'; updateTotal(0); return; }

            cart.forEach((x, i) => {
                sub += x.preco * x.qtd;
                cont.innerHTML += `
                    <div class="flex justify-between items-center text-sm">
                        <div class="flex gap-2 items-center">
                            <button onclick="removerItemCheckout(${i})" class="text-stone-300 hover:text-red-500 mr-1"><span class="material-symbols-outlined text-[16px]">delete</span></button>
                            <span class="font-bold text-stone-400">${x.qtd}x</span>
                            <span class="font-bold text-black">${x.nome}</span>
                        </div>
                        <span class="font-bold">R$ ${(x.preco * x.qtd).toFixed(2).replace('.', ',')}</span>
                    </div>`;
            });
            updateTotal(sub);
        }

        function removerItemCheckout(i) { cart.splice(i, 1); localStorage.setItem('allvino_cart', JSON.stringify(cart)); renderItems(); }

        function updateTotal(sub) {
            const isRetirada = document.querySelector('input[name="entrega"]:checked').value === 'retirada';
            const desc = isRetirada ? sub * 0.1 : 0;
            document.getElementById('subtotal').innerText = `R$ ${sub.toFixed(2).replace('.', ',')}`;
            document.getElementById('total').innerText = `R$ ${(sub - desc).toFixed(2).replace('.', ',')}`;
            const descCont = document.getElementById('desconto-container');
            if (desc > 0) { descCont.classList.remove('hidden'); document.getElementById('desconto').innerText = `- R$ ${desc.toFixed(2).replace('.', ',')}`; } else { descCont.classList.add('hidden'); }
        }

        function toggleEndereco(show) { document.getElementById('endereco-container').style.display = show ? 'block' : 'none'; let sub = cart.reduce((a, b) => a + (b.preco * b.qtd), 0); updateTotal(sub); }

        function finalizarPedido() {
            if(cart.length === 0) { alert("Carrinho vazio!"); return; }
            const entrega = document.querySelector('input[name="entrega"]:checked').value; const endereco = document.getElementById('endereco').value; const pagamento = document.getElementById('pagamento').value; const total = document.getElementById('total').innerText;
            if (entrega === 'entrega' && !endereco) { alert("Informe o seu endereço para entrega."); return; }

            let itensMsg = cart.map(x => `🍷 *${x.qtd}x ${x.nome}*`).join('\n');
            let msg = `*NOVO PEDIDO - ALLVINO*\n\n👤 *Cliente:* ${document.getElementById('user-name').value}\n📞 *WhatsApp:* ${document.getElementById('user-phone').value}\n\n📦 *ITENS DO PEDIDO:* \n${itensMsg}\n\n💳 *Pagamento:* ${pagamento}\n🚚 *Modalidade:* ${entrega === 'retirada' ? 'Retirada na Loja (-10% OFF)' : 'Entrega no Endereço'}\n`;
            if(entrega === 'entrega') msg += `📍 *Endereço:* ${endereco}\n`;
            msg += `\n💰 *VALOR TOTAL: ${total}*`;

            const foneVendas = "5527997933537"; 
            const link = `https://wa.me/${foneVendas}?text=${encodeURIComponent(msg)}`;
            
            localStorage.removeItem('allvino_cart'); window.open(link, '_blank'); window.location.replace('catalogo.html');
        }

        document.addEventListener("DOMContentLoaded", initCheckout);
    </script>
</body>
</html>
