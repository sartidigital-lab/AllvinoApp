<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Allvino - Finalizar Pedido</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,300;0,700&family=Manrope:wght@400;700&display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { background-color: #FDFBF7; font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="pb-32">
    <header class="bg-white sticky top-0 z-40 border-b border-stone-100 flex items-center px-5 py-4">
        <a href="catalogo.html" class="p-1 flex items-center justify-center"><span class="material-symbols-outlined text-black">arrow_back</span></a>
        <h1 class="flex-1 text-center font-bold text-lg">Finalizar Pedido</h1>
        <div class="w-8"></div>
    </header>

    <main class="max-w-md mx-auto px-5 pt-6 space-y-8">
        
        <section class="bg-white p-6 rounded-3xl border border-stone-100 shadow-sm">
            <h2 class="text-xs font-bold text-stone-400 uppercase tracking-widest mb-4">Resumo da Seleção</h2>
            <div id="checkout-items" class="space-y-3 mb-4 border-b border-stone-100 pb-4"></div>
            <div class="flex justify-between items-center text-lg font-bold">
                <span>Total</span>
                <span id="checkout-total">R$ 0,00</span>
            </div>
        </section>

        <form id="formCheckout" class="space-y-6">
            <section class="space-y-4">
                <h2 class="text-xs font-bold text-stone-400 uppercase tracking-widest">Seus Dados</h2>
                <input type="text" id="nomeCliente" placeholder="Seu Nome" required class="w-full bg-white border border-stone-200 rounded-xl py-3 px-4 focus:border-black outline-none transition-colors">
            </section>

            <section class="space-y-4">
                <h2 class="text-xs font-bold text-stone-400 uppercase tracking-widest">Forma de Entrega</h2>
                <div class="grid grid-cols-2 gap-3">
                    <label class="border border-stone-200 rounded-xl p-4 flex flex-col items-center gap-2 cursor-pointer hover:border-black has-[:checked]:border-[#B91C1C] has-[:checked]:bg-red-50 transition-all">
                        <input type="radio" name="tipoEntrega" value="Retirar na Loja" class="hidden" checked onchange="toggleEndereco()">
                        <span class="material-symbols-outlined text-[#B91C1C]">storefront</span>
                        <span class="text-xs font-bold text-center">Retirar na Loja<br><span class="text-green-600">-10% OFF</span></span>
                    </label>
                    <label class="border border-stone-200 rounded-xl p-4 flex flex-col items-center gap-2 cursor-pointer hover:border-black has-[:checked]:border-[#B91C1C] has-[:checked]:bg-red-50 transition-all">
                        <input type="radio" name="tipoEntrega" value="Entrega em Casa" class="hidden" onchange="toggleEndereco()">
                        <span class="material-symbols-outlined text-[#B91C1C]">local_shipping</span>
                        <span class="text-xs font-bold text-center">Entrega em Casa</span>
                    </label>
                </div>
                <div id="campoEndereco" class="hidden mt-4 animate-fade-in">
                    <textarea id="moradaCliente" rows="2" placeholder="Endereço Completo (Rua, Nº, Bairro)" class="w-full bg-white border border-stone-200 rounded-xl py-3 px-4 focus:border-black outline-none transition-colors"></textarea>
                </div>
            </section>

            <section class="space-y-4">
                <h2 class="text-xs font-bold text-stone-400 uppercase tracking-widest">Forma de Pagamento</h2>
                <div class="space-y-3">
                    <label class="flex items-center gap-3 p-4 bg-white border border-stone-200 rounded-xl cursor-pointer hover:border-black has-[:checked]:border-black transition-all">
                        <input type="radio" name="pagamento" value="PIX" class="text-black focus:ring-0" checked>
                        <span class="material-symbols-outlined text-green-600">qr_code_2</span>
                        <span class="font-bold text-sm">PIX (Pagamento Instantâneo)</span>
                    </label>
                    <label class="flex items-center gap-3 p-4 bg-white border border-stone-200 rounded-xl cursor-pointer hover:border-black has-[:checked]:border-black transition-all">
                        <input type="radio" name="pagamento" value="Cartão de Crédito" class="text-black focus:ring-0">
                        <span class="material-symbols-outlined text-blue-600">credit_card</span>
                        <span class="font-bold text-sm">Cartão de Crédito</span>
                    </label>
                </div>
            </section>

            <div class="fixed bottom-0 left-0 w-full bg-white border-t border-stone-100 p-5 z-50">
                <button type="submit" class="w-full max-w-md mx-auto block bg-[#25D366] text-white py-4 rounded-2xl font-bold uppercase tracking-widest flex items-center justify-center gap-2 shadow-lg hover:bg-green-600 active:scale-95 transition-all">
                    <span class="material-symbols-outlined">send</span> Finalizar no WhatsApp
                </button>
            </div>
        </form>
    </main>

    <script>
        const WHATSAPP_LOJA = "552732619494"; 
        let carrinho = JSON.parse(localStorage.getItem('allvino_cart')) || [];
        let totalFinal = 0;

        function carregarResumo() {
            const container = document.getElementById('checkout-items');
            if (carrinho.length === 0) {
                container.innerHTML = '<p class="text-center py-4 text-stone-400">Carrinho vazio.</p>';
                return;
            }
            container.innerHTML = '';
            let subtotal = 0;
            carrinho.forEach(item => {
                subtotal += item.preco * item.qtd;
                container.innerHTML += `
                    <div class="flex justify-between text-sm">
                        <span>${item.qtd}x ${item.nome}</span>
                        <span class="font-bold">R$ ${(item.preco * item.qtd).toFixed(2).replace('.', ',')}</span>
                    </div>`;
            });
            atualizarValores(subtotal);
        }

        function atualizarValores(subtotal) {
            const entrega = document.querySelector('input[name="tipoEntrega"]:checked').value;
            const desconto = (entrega === 'Retirar na Loja') ? subtotal * 0.10 : 0;
            totalFinal = subtotal - desconto;
            document.getElementById('checkout-total').innerText = `R$ ${totalFinal.toFixed(2).replace('.', ',')}`;
        }

        function toggleEndereco() {
            const entrega = document.querySelector('input[name="tipoEntrega"]:checked').value;
            document.getElementById('campoEndereco').classList.toggle('hidden', entrega === 'Retirar na Loja');
            document.getElementById('moradaCliente').required = (entrega === 'Entrega em Casa');
            const sub = carrinho.reduce((a, b) => a + (b.preco * b.qtd), 0);
            atualizarValores(sub);
        }

        document.getElementById('formCheckout').addEventListener('submit', function(e) {
            e.preventDefault();
            const nome = document.getElementById('nomeCliente').value;
            const entrega = document.querySelector('input[name="tipoEntrega"]:checked').value;
            const endereco = document.getElementById('moradaCliente').value;
            const pgto = document.querySelector('input[name="pagamento"]:checked').value;

            let msg = `*NOVO PEDIDO - ALLVINO* 🍷\n\n`;
            msg += `*Cliente:* ${nome}\n`;
            msg += `*Entrega:* ${entrega}\n`;
            if(entrega === 'Entrega em Casa') msg += `*Endereço:* ${endereco}\n`;
            msg += `*Pagamento:* ${pgto}\n\n`;
            msg += `*PRODUTOS:*\n`;
            carrinho.forEach(i => msg += `- ${i.qtd}x ${i.nome} (R$ ${(i.preco*i.qtd).toFixed(2)})\n`);
            msg += `\n*TOTAL: R$ ${totalFinal.toFixed(2).replace('.', ',')}*`;

            window.open(`https://wa.me/${WHATSAPP_LOJA}?text=${encodeURIComponent(msg)}`, '_blank');
        });

        document.addEventListener("DOMContentLoaded", carregarResumo);
    </script>
</body>
</html>
