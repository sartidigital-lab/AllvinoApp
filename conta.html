<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Allvino - Minha Conta</title>

    <!-- Configurações do Ícone e Aplicativo (PWA) -->
    <link rel="manifest" href="manifest-v4.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png?v=4">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,300;0,700&family=Manrope:wght@400;700&display=swap" rel="stylesheet"/>
    <style>.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; } body { background-color: #FDFBF7; font-family: 'Manrope', sans-serif; }</style>
</head>
<body class="pb-32 transition-opacity duration-300 opacity-0" id="conta-body">
    <header class="bg-white/90 backdrop-blur-md sticky top-0 z-40 border-b border-stone-100 flex justify-between items-center w-full px-5 py-4">
        <!-- Seta SVG Nativa -->
        <a href="catalogo.html" class="p-1 flex items-center justify-center hover:bg-stone-100 rounded-full transition">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 text-black">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
            </svg>
        </a>
        <a href="catalogo.html" class="h-10 flex items-center justify-center">
            <img src="LOGO-ALLVINO-PRETO.png" alt="Allvino" class="h-full w-auto object-contain scale-150 transform origin-center">
        </a>
        <div class="w-8"></div>
    </header>

    <main class="max-w-xl mx-auto px-5 pt-8 space-y-6">
        <!-- CABEÇALHO DO PERFIL -->
        <div class="space-y-2 text-center mb-8">
            <div class="w-20 h-20 bg-stone-200 rounded-full mx-auto flex items-center justify-center mb-4">
                <span class="material-symbols-outlined text-4xl text-stone-400">person</span>
            </div>
            <h1 class="text-3xl font-bold font-serif text-black" id="user-nome-display">Carregando...</h1>
            <p class="text-stone-500 text-sm" id="user-email-display">Acessando dados</p>
        </div>

        <!-- FORMULÁRIO DE EDIÇÃO -->
        <div class="bg-white rounded-3xl p-6 border border-stone-100 shadow-sm space-y-5">
            <h2 class="text-xs font-bold text-stone-400 uppercase tracking-widest border-b pb-2 flex items-center gap-2">
                <span class="material-symbols-outlined text-[16px]">edit_document</span> Meus Dados
            </h2>
            
            <form id="form-perfil" onsubmit="salvarPerfil(event)" class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-stone-400 uppercase tracking-widest ml-1">Nome Completo</label>
                    <input type="text" id="edit-nome" required class="w-full bg-white border border-stone-200 text-black rounded-xl py-3 px-4 outline-none focus:border-black transition-colors shadow-sm mt-1 text-sm font-bold">
                </div>
                
                <div>
                    <label class="text-[10px] font-bold text-stone-400 uppercase tracking-widest ml-1">E-mail (Bloqueado por segurança)</label>
                    <input type="email" id="edit-email" readonly class="w-full bg-stone-50 border border-stone-200 text-stone-500 rounded-xl py-3 px-4 outline-none transition-colors shadow-sm mt-1 text-sm">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-stone-400 uppercase tracking-widest ml-1">WhatsApp</label>
                        <input type="tel" id="edit-whatsapp" placeholder="(00) 00000-0000" required class="w-full bg-white border border-stone-200 text-black rounded-xl py-3 px-4 outline-none focus:border-black transition-colors shadow-sm mt-1 text-sm font-bold">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-stone-400 uppercase tracking-widest ml-1">Data de Nascimento</label>
                        <input type="date" id="edit-nascimento" class="w-full bg-white border border-stone-200 text-black rounded-xl py-3 px-4 outline-none focus:border-black transition-colors shadow-sm mt-1 text-sm font-bold">
                    </div>
                </div>

                <button type="submit" id="btn-salvar" class="w-full bg-black text-white py-4 rounded-2xl font-bold text-sm active:scale-95 transition-transform shadow-lg mt-2 flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-[18px]">save</span> Salvar Alterações
                </button>
            </form>
        </div>

        <!-- ZONA DE SAÍDA -->
        <div class="pt-4">
            <button onclick="fazerLogout()" class="w-full flex items-center justify-center gap-2 p-4 rounded-2xl border border-red-100 bg-red-50 text-red-600 hover:bg-red-100 transition-colors active:scale-95 font-bold text-sm">
                <span class="material-symbols-outlined text-[18px]">logout</span> Sair da minha conta
            </button>
        </div>
    </main>

    <!-- MENU INFERIOR -->
    <nav class="bg-white/90 backdrop-blur-md fixed bottom-0 left-0 w-full z-40 rounded-t-2xl border-t border-stone-100 shadow-[0_-10px_30px_rgba(0,0,0,0.04)] flex justify-around items-center px-6 pb-6 pt-3">
        <a class="flex flex-col items-center text-stone-400 hover:text-black transition-colors" href="index.html">
            <span class="material-symbols-outlined">home</span>
            <span class="text-[10px] uppercase tracking-tighter mt-1 font-bold">Início</span>
        </a>
        <a class="flex flex-col items-center text-stone-400 hover:text-black transition-colors" href="catalogo.html">
            <span class="material-symbols-outlined">apps</span>
            <span class="text-[10px] uppercase tracking-tighter mt-1 font-bold">Catálogo</span>
        </a>
        <a class="flex flex-col items-center text-[#B91C1C] font-bold" href="conta.html">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
            <span class="text-[10px] uppercase tracking-tighter mt-1">Conta</span>
        </a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://jfgtafnfuqlysdnvsbhk.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpmZ3RhZm5mdXFseXNkbnZzYmhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDY1NzgsImV4cCI6MjA5MjcyMjU3OH0.mZDnR1A8VIJVUzedb7GU1db628dSqU-8SdvBFXXVaE4';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function initConta() {
            const { data: { session }, error } = await supabaseClient.auth.getSession();
            
            if (error || !session) { 
                window.location.replace('login.html'); 
                return; 
            }
            
            document.getElementById('conta-body').classList.remove('opacity-0');
            
            const user = session.user;
            const userData = user.user_metadata || {};
            
            // Preenche o cabeçalho visual
            document.getElementById('user-nome-display').innerText = userData.nome_completo || 'Cliente Allvino';
            document.getElementById('user-email-display').innerText = user.email;

            // Preenche o formulário
            document.getElementById('edit-nome').value = userData.nome_completo || '';
            document.getElementById('edit-email').value = user.email || '';
            document.getElementById('edit-whatsapp').value = userData.telefone || '';
            document.getElementById('edit-nascimento').value = userData.data_nascimento || '';
        }

        async function salvarPerfil(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-salvar');
            const textoOriginal = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined text-[18px] animate-spin">sync</span> Salvando...';
            btn.disabled = true;

            const nome = document.getElementById('edit-nome').value;
            const whatsapp = document.getElementById('edit-whatsapp').value;
            const nascimento = document.getElementById('edit-nascimento').value;

            // Atualiza os metadados do usuário no Supabase
            const { data, error } = await supabaseClient.auth.updateUser({
                data: { 
                    nome_completo: nome, 
                    telefone: whatsapp,
                    data_nascimento: nascimento
                }
            });

            if (error) {
                alert("Erro ao atualizar dados: " + error.message);
            } else {
                // Atualiza o nome no cabeçalho na hora
                document.getElementById('user-nome-display').innerText = nome;
                alert("Perfil atualizado com sucesso!");
            }

            btn.innerHTML = textoOriginal;
            btn.disabled = false;
        }

        async function fazerLogout() {
            if(confirm("Deseja realmente sair da sua conta?")) {
                await supabaseClient.auth.signOut();
                window.location.replace('login.html');
            }
        }

        document.addEventListener("DOMContentLoaded", initConta);
    </script>
</body>
</html>
