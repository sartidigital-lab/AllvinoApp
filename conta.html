<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Allvino - Minha Conta</title>

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icone-app.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,300;0,700&family=Manrope:wght@400;700&display=swap" rel="stylesheet"/>
    <style>.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; } body { background-color: #FDFBF7; font-family: 'Manrope', sans-serif; }</style>
</head>
<body class="pb-24 transition-opacity duration-300 opacity-0" id="conta-body">
    <header class="bg-white/90 backdrop-blur-md sticky top-0 z-40 border-b border-stone-100 flex justify-between items-center w-full px-5 py-4">
        <a href="catalogo.html" class="p-1 flex items-center justify-center hover:bg-stone-100 rounded-full transition">
            <span class="material-symbols-outlined text-black">arrow_back</span>
        </a>
        <a href="catalogo.html" class="h-10 flex items-center justify-center">
            <img src="LOGO-ALLVINO-PRETO.png" alt="Allvino" class="h-full w-auto object-contain scale-150 transform origin-center">
        </a>
        <div class="w-8"></div>
    </header>

    <main class="max-w-xl mx-auto px-5 pt-8 space-y-8">
        <div class="space-y-2 text-center">
            <div class="w-20 h-20 bg-stone-200 rounded-full mx-auto flex items-center justify-center mb-4">
                <span class="material-symbols-outlined text-4xl text-stone-400">person</span>
            </div>
            <h1 class="text-3xl font-bold font-serif text-black" id="user-nome">Carregando...</h1>
            <p class="text-stone-500 text-sm" id="user-email">Acessando dados</p>
        </div>

        <div class="bg-white rounded-3xl p-6 border border-stone-100 shadow-sm space-y-5 mt-8">
            <h2 class="text-xs font-bold text-stone-400 uppercase tracking-widest border-b pb-2">Central do Cliente</h2>
            <div class="space-y-4">
                <button onclick="fazerLogout()" class="w-full flex items-center justify-between p-4 rounded-2xl border border-red-100 bg-red-50 text-red-600 hover:bg-red-100 transition-colors active:scale-95">
                    <div class="flex items-center gap-3">
                        <span class="material-symbols-outlined">logout</span>
                        <span class="font-bold text-sm">Sair da Conta</span>
                    </div>
                    <span class="material-symbols-outlined text-sm">chevron_right</span>
                </button>
            </div>
        </div>
    </main>

    <nav class="bg-white/90 backdrop-blur-md fixed bottom-0 left-0 w-full z-40 rounded-t-2xl border-t border-stone-100 shadow-[0_-10px_30px_rgba(0,0,0,0.04)] flex justify-around items-center px-6 pb-6 pt-3">
        <a class="flex flex-col items-center text-stone-400 hover:text-black transition-colors" href="index.html">
            <span class="material-symbols-outlined">home</span>
            <span class="text-[10px] uppercase tracking-tighter mt-1 font-bold">Início</span>
        </a>
        <a class="flex flex-col items-center text-stone-400 hover:text-black transition-colors" href="catalogo.html">
            <span class="material-symbols-outlined">apps</span>
            <span class="text-[10px] uppercase tracking-tighter mt-1 font-bold">Catálogo</span>
        </a>
        <a class="flex flex-col items-center text-[#B91C1C] font-bold" href="conta.html">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
            <span class="text-[10px] uppercase tracking-tighter mt-1">Conta</span>
        </a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://jfgtafnfuqlysdnvsbhk.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpmZ3RhZm5mdXFseXNkbnZzYmhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDY1NzgsImV4cCI6MjA5MjcyMjU3OH0.mZDnR1A8VIJVUzedb7GU1db628dSqU-8SdvBFXXVaE4';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function initConta() {
            const { data: { session }, error } = await supabaseClient.auth.getSession();
            
            // Se não estiver logado, manda para o login
            if (error || !session) { 
                window.location.replace('login.html'); 
                return; 
            }
            
            document.getElementById('conta-body').classList.remove('opacity-0');
            
            const user = session.user;
            const userData = user.user_metadata || {};
            
            document.getElementById('user-nome').innerText = userData.nome_completo || 'Cliente Allvino';
            document.getElementById('user-email').innerText = user.email;
        }

        async function fazerLogout() {
            if(confirm("Deseja realmente sair da sua conta?")) {
                await supabaseClient.auth.signOut();
                window.location.replace('login.html');
            }
        }

        document.addEventListener("DOMContentLoaded", initConta);
    </script>
</body>
</html>
