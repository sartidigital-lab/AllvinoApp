<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Allvino - Painel Master</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,300;0,700&family=Manrope:wght@300;400;700&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
          theme: {
            extend: {
              colors: { primary: "#000000", secondary: "#B91C1C" },
              fontFamily: { "body": ["Manrope", "sans-serif"], "headline": ["Noto Serif", "serif"] }
            }
          }
        }
    </script>

    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        body { background-color: #FDFBF7; font-family: 'Manrope', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.6; transition: 0.2s; }
        input[type="date"]::-webkit-calendar-picker-indicator:hover { opacity: 1; }
    </style>
</head>
<body class="text-primary overflow-x-hidden min-h-screen">

    <header class="bg-[#111111] border-b border-stone-800 sticky top-0 z-40 flex justify-between items-center w-full px-5 py-4 lg:pl-72 shadow-sm text-white">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="lg:hidden p-1 hover:bg-stone-800 rounded-md transition-colors"><span class="material-symbols-outlined">menu</span></button>
            <h2 class="text-lg font-bold hidden sm:block">Gestão Allvino</h2>
        </div>
        <div class="flex items-center gap-3">
            <span class="text-sm font-bold text-stone-300">Olá, Theo</span>
            <span class="text-[10px] bg-stone-300 text-black px-2 py-0.5 rounded-full uppercase font-bold">Master</span>
        </div>
    </header>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 flex flex-col h-full w-64 bg-[#0a0a0a] border-r border-stone-800 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out shadow-2xl lg:shadow-none">
        <div class="px-6 py-6 border-b border-stone-800 bg-[#111111] flex justify-between">
            <img src="LOGO-ALLVINO-BRANCO.png" class="h-10">
            <button onclick="toggleSidebar()" class="lg:hidden text-stone-400"><span class="material-symbols-outlined">close</span></button>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto no-scrollbar">
            <button type="button" onclick="showTab('bi')" class="w-full flex items-center px-4 py-3 text-stone-400 hover:bg-stone-800 hover:text-white rounded-xl transition font-bold"><span class="material-symbols-outlined mr-3 text-secondary">analytics</span> BI Analytics</button>
            <button type="button" onclick="showTab('catalogo')" class="w-full flex items-center px-4 py-3 text-stone-400 hover:bg-stone-800 hover:text-white rounded-xl transition font-bold"><span class="material-symbols-outlined mr-3 text-blue-400">wine_bar</span> Catálogo</button>
            <button type="button" onclick="showTab('promo')" class="w-full flex items-center px-4 py-3 text-stone-400 hover:bg-stone-800 hover:text-white rounded-xl transition font-bold"><span class="material-symbols-outlined mr-3 text-green-500">campaign</span> Promoções</button>
            <button type="button" onclick="showTab('usuarios')" class="w-full flex items-center px-4 py-3 text-stone-400 hover:bg-stone-800 hover:text-white rounded-xl transition font-bold"><span class="material-symbols-outlined mr-3 text-orange-400">group</span> Equipe</button>
            <button type="button" onclick="showTab('perfil')" class="w-full flex items-center px-4 py-3 text-stone-400 hover:bg-stone-800 hover:text-white rounded-xl transition font-bold"><span class="material-symbols-outlined mr-3 text-purple-400">person_edit</span> Meu Perfil</button>
        </nav>
        <div class="p-6 border-t border-stone-800">
            <a href="#" onclick="fazerLogout()" class="flex text-secondary font-bold text-sm hover:text-red-400 transition-colors">
                <span class="material-symbols-outlined mr-2">logout</span> Sair do Sistema
            </a>
        </div>
    </aside>

    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 z-40 hidden lg:hidden backdrop-blur-sm transition-opacity"></div>

    <main class="lg:ml-64 p-5 lg:p-8 max-w-7xl mx-auto pb-32">
        
        <div id="tab-bi" class="tab-content active space-y-8">
            <div class="flex flex-col md:flex-row justify-between md:items-end gap-4 border-b border-stone-200 pb-6">
                <h1 class="text-3xl font-bold font-serif">Inteligência Allvino</h1>
                <div class="flex flex-col sm:flex-row gap-3">
                    <div class="flex items-center gap-2 bg-white border border-stone-200 px-3 py-2 rounded-xl shadow-sm w-fit">
                        <span class="material-symbols-outlined text-stone-400 text-[20px]">calendar_month</span>
                        <select id="filtro-tempo" onchange="toggleDataCustom()" class="bg-transparent text-sm font-bold text-black outline-none border-none focus:ring-0 cursor-pointer">
                            <option value="hoje">Hoje</option>
                            <option value="7d">Últimos 7 dias</option>
                            <option value="30d">Últimos 30 dias</option>
                            <option value="ano">Este Ano</option>
                            <option value="custom">Período Personalizado</option>
                        </select>
                    </div>
                    <div id="datas-custom" class="hidden items-center gap-2 bg-white border border-stone-200 px-3 py-2 rounded-xl shadow-sm transition-all w-fit">
                        <input type="date" class="text-sm font-bold text-stone-600 outline-none border-none focus:ring-0 bg-transparent p-0 cursor-pointer">
                        <span class="text-stone-300 text-xs font-bold px-1">ATÉ</span>
                        <input type="date" class="text-sm font-bold text-stone-600 outline-none border-none focus:ring-0 bg-transparent p-0 cursor-pointer">
                        <button type="button" onclick="alert('Filtro aplicado!')" class="bg-black text-white px-4 py-1.5 rounded-lg text-xs font-bold uppercase tracking-widest hover:bg-stone-800 transition ml-1">Filtrar</button>
                    </div>
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-black text-white p-6 rounded-2xl shadow-lg"><p class="text-white/60 text-xs font-bold uppercase">Faturamento</p><h3 class="text-3xl font-bold mt-2">R$ 14.250</h3></div>
                <div class="bg-white p-6 rounded-2xl border shadow-sm"><p class="text-stone-400 text-xs font-bold uppercase">Garrafas Vendidas</p><h3 class="text-3xl font-bold mt-2">114</h3></div>
                <div class="bg-white p-6 rounded-2xl border shadow-sm"><p class="text-stone-400 text-xs font-bold uppercase">Clientes</p><h3 class="text-3xl font-bold mt-2">32</h3></div>
            </div>
        </div>

        <div id="tab-catalogo" class="tab-content space-y-8">
            <div class="flex justify-between items-center border-b pb-6">
                <h1 class="text-3xl font-bold font-serif">Gestão do Catálogo</h1>
                <button type="button" onclick="toggleModal('modal-produto')" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg flex items-center gap-2">
                    <span class="material-symbols-outlined text-[20px]">add</span> Novo Vinho
                </button>
            </div>
            <div class="bg-white rounded-2xl border shadow-sm overflow-hidden overflow-x-auto">
                <table class="w-full text-left min-w-[800px]">
                    <thead class="bg-stone-50 border-b text-xs uppercase font-bold text-stone-400">
                        <tr><th class="px-6 py-4">Vinho</th><th class="px-6 py-4">País</th><th class="px-6 py-4">Preço App</th><th class="px-6 py-4 text-right">Ações</th></tr>
                    </thead>
                    <tbody class="divide-y divide-stone-100 text-sm" id="tabela-produtos">
                        <tr>
                            <td colspan="4" class="px-6 py-8 text-center text-stone-400 font-bold">Carregando catálogo...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div id="tab-promo" class="tab-content space-y-8"><div class="flex justify-between items-center border-b pb-6"><h1 class="text-3xl font-bold font-serif">Promoções e Kits</h1><button type="button" onclick="toggleModal('modal-promo')" class="bg-green-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg">Nova Oferta</button></div></div>
        <div id="tab-usuarios" class="tab-content space-y-8"><div class="flex justify-between items-center border-b pb-6"><h1 class="text-3xl font-bold font-serif">Gestão de Equipe</h1><button type="button" onclick="toggleModal('modal-equipe')" class="bg-orange-500 text-white px-6 py-3 rounded-xl font-bold shadow-lg">Novo Usuário</button></div></div>
        <div id="tab-perfil" class="tab-content space-y-8"><div class="border-b pb-6"><h1 class="text-3xl font-bold font-serif">Meu Perfil</h1></div></div>

    </main>

    <div id="modal-produto" class="fixed inset-0 z-[60] flex justify-end hidden opacity-0 transition-opacity duration-300">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="toggleModal('modal-produto')"></div>
        <div class="relative w-full max-w-md h-full bg-white flex flex-col transform translate-x-full transition-transform duration-300 shadow-2xl">
            <div class="flex justify-between px-6 py-5 border-b bg-stone-50"><h2 class="text-xl font-bold">Produto</h2><button type="button" onclick="toggleModal('modal-produto')"><span class="material-symbols-outlined">close</span></button></div>
            <div class="flex-1 overflow-y-auto p-6">
                <form id="form-produto" onsubmit="salvarDados(event, 'modal-produto')" class="space-y-4">
                    <label class="border-2 border-dashed border-stone-300 rounded-2xl p-6 flex flex-col items-center cursor-pointer hover:bg-stone-50 relative overflow-hidden group">
                        <input type="file" id="foto-vinho" accept="image/png, image/jpeg" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" required>
                        <span class="material-symbols-outlined text-[40px] text-stone-400 group-hover:text-blue-500 transition-colors">add_photo_alternate</span>
                        <p class="font-bold text-sm text-center mt-2 group-hover:text-blue-500">Enviar Foto</p>
                        <p id="nome-arquivo" class="text-[10px] text-stone-400 mt-1 uppercase tracking-widest text-center truncate max-w-[200px]">PNG ou JPG transparente</p>
                    </label>
                    <input type="text" id="nome" placeholder="Nome Comercial" class="w-full border p-4 rounded-xl font-bold text-sm" required>
                    <textarea id="descricao" rows="3" placeholder="Descrição do Produto" class="w-full border p-4 rounded-xl text-sm"></textarea>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="sku" placeholder="SKU" class="border p-4 rounded-xl font-mono text-sm" required>
                        <input type="number" id="preco" step="0.01" placeholder="Preço R$" class="border p-4 rounded-xl font-bold text-sm" required>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <div class="flex justify-between"><label class="text-[10px] font-bold text-stone-400">PAÍS</label><a href="#" onclick="addCategoria('pais')" class="text-[10px] text-blue-600">+ Novo</a></div>
                            <select id="pais" class="w-full border p-4 rounded-xl text-sm mt-1"><option>Portugal</option><option>França</option><option>Brasil</option><option>Argentina</option></select>
                        </div>
                        <div>
                            <div class="flex justify-between"><label class="text-[10px] font-bold text-stone-400">TIPO</label><a href="#" onclick="addCategoria('tipo')" class="text-[10px] text-blue-600">+ Novo</a></div>
                            <select id="tipo" class="w-full border p-4 rounded-xl text-sm mt-1"><option>Branco</option><option>Tinto</option><option>Rosé</option></select>
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold mt-4 shadow-lg hover:bg-blue-700 transition">Salvar Produto</button>
                </form>
            </div>
        </div>
    </div>


    <script>
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); document.getElementById('sidebar-overlay').classList.toggle('hidden'); }
        function showTab(t) { document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); document.getElementById('tab-' + t).classList.add('active'); if(window.innerWidth < 1024) toggleSidebar(); }
        function toggleModal(id) {
            const m = document.getElementById(id), p = m.querySelector('.relative');
            if (m.classList.contains('hidden')) { m.classList.remove('hidden'); setTimeout(() => { m.classList.remove('opacity-0'); p.classList.remove('translate-x-full'); }, 10); } 
            else { m.classList.add('opacity-0'); p.classList.add('translate-x-full'); setTimeout(() => m.classList.add('hidden'), 300); }
        }
        function addCategoria(selectId) {
            const nova = prompt(`Digite a nova categoria:`);
            if (nova && nova.trim() !== '') { const s = document.getElementById(selectId), opt = document.createElement('option'); opt.text = nova; opt.value = nova; s.add(opt); s.value = nova; }
        }
        function toggleDataCustom() {
            const select = document.getElementById('filtro-tempo'), customDiv = document.getElementById('datas-custom');
            if(select.value === 'custom') { customDiv.classList.remove('hidden'); customDiv.classList.add('flex'); } else { customDiv.classList.add('hidden'); customDiv.classList.remove('flex'); }
        }

        // Script visual para mostrar o nome da foto selecionada
        document.getElementById('foto-vinho').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name;
            if(fileName) document.getElementById('nome-arquivo').innerText = fileName;
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const supabaseUrl = 'https://jfgtafnfuqlysdnvsbhk.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpmZ3RhZm5mdXFseXNkbnZzYmhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDY1NzgsImV4cCI6MjA5MjcyMjU3OH0.mZDnR1A8VIJVUzedb7GU1db628dSqU-8SdvBFXXVaE4';
        
        let supabase;
        if (window.supabase) {
            supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
            // Ao carregar a página, já busca os produtos no banco
            carregarProdutos();
        }

        // FUNÇÃO DE LOGOUT
        async function fazerLogout() {
            if(supabase) {
                await supabase.auth.signOut();
                window.location.href = 'admin-login.html';
            }
        }

        // FUNÇÃO PARA BUSCAR E RENDERIZAR OS PRODUTOS NA TABELA
        async function carregarProdutos() {
            const { data, error } = await supabase.from('produtos').select('*').order('criado_em', { ascending: false });
            
            const tbody = document.getElementById('tabela-produtos');
            tbody.innerHTML = ''; // Limpa a tabela

            if (error) {
                tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-4 text-center text-red-500">Erro ao carregar dados.</td></tr>`;
                return;
            }

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-8 text-center text-stone-400 font-bold">Nenhum vinho cadastrado ainda.</td></tr>`;
                return;
            }

            // Popula a tabela dinamicamente com os dados reais
            data.forEach(produto => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-stone-50 border-b border-stone-100 transition-colors";
                tr.innerHTML = `
                    <td class="px-6 py-4 font-bold flex items-center gap-4">
                        <div class="h-12 w-10 bg-stone-100 rounded-lg flex items-center justify-center p-1">
                            <img src="${produto.imagem_url || 'https://via.placeholder.com/50'}" class="h-full w-full object-contain mix-blend-multiply">
                        </div>
                        <div class="flex flex-col">
                            <span class="text-sm">${produto.nome}</span>
                            <span class="text-[10px] text-stone-400 font-mono">${produto.sku_sankhya}</span>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-sm">${produto.pais || '-'} <br><span class="text-[10px] font-bold uppercase text-stone-400">${produto.tipo}</span></td>
                    <td class="px-6 py-4 font-bold text-sm">R$ ${produto.preco.toFixed(2).replace('.', ',')}</td>
                    <td class="px-6 py-4 text-right">
                        <button type="button" class="text-blue-600 font-bold px-3 py-1.5 bg-blue-50 rounded-lg mr-2 text-xs hover:bg-blue-100 transition">Editar</button>
                        <button type="button" onclick="deletarProduto('${produto.id}')" class="text-red-600 font-bold px-3 py-1.5 bg-red-50 rounded-lg text-xs hover:bg-red-100 transition">Remover</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // FUNÇÃO DE SALVAR COM UPLOAD DE IMAGEM
        async function salvarDados(event, modalId = null) {
            event.preventDefault(); 
            
            const btn = event.submitter;
            const textoOriginal = btn.innerText;
            btn.innerText = "Fazendo Upload e Salvando...";
            btn.disabled = true;

            if (modalId === 'modal-produto' && supabase) {
                // 1. Captura os dados de texto
                const nome = document.getElementById('nome').value;
                const descricao = document.getElementById('descricao').value;
                const sku = document.getElementById('sku').value;
                const preco = document.getElementById('preco').value;
                const pais = document.getElementById('pais').value;
                const tipo = document.getElementById('tipo').value;

                // 2. Captura o Arquivo de Imagem
                const fotoInput = document.getElementById('foto-vinho');
                const file = fotoInput.files[0];
                let imagemUrl = null;

                // Lógica de Upload para a pasta 'produtos' do Supabase Storage
                if (file) {
                    const fileExt = file.name.split('.').pop();
                    const fileName = `${Date.now()}-${Math.floor(Math.random() * 1000)}.${fileExt}`; // Nome único
                    
                    const { data: uploadData, error: uploadError } = await supabase.storage
                        .from('produtos')
                        .upload(fileName, file);

                    if (uploadError) {
                        alert("Erro no upload da imagem: " + uploadError.message);
                        btn.innerText = textoOriginal;
                        btn.disabled = false;
                        return; // Interrompe se a foto falhar
                    }

                    // Se a foto subiu com sucesso, pega o link público dela
                    const { data: publicUrlData } = supabase.storage.from('produtos').getPublicUrl(fileName);
                    imagemUrl = publicUrlData.publicUrl;
                }

                // 3. Salva no banco de dados (agora com o link da imagem)
                const { error: dbError } = await supabase
                    .from('produtos')
                    .insert([
                        { 
                            nome: nome, 
                            descricao: descricao, 
                            sku_sankhya: sku, 
                            preco: parseFloat(preco), 
                            pais: pais, 
                            tipo: tipo,
                            imagem_url: imagemUrl // <--- A MÁGICA ACONTECE AQUI
                        }
                    ]);

                if (dbError) {
                    alert("Erro ao salvar no banco: " + dbError.message);
                } else {
                    document.getElementById('form-produto').reset(); 
                    document.getElementById('nome-arquivo').innerText = "PNG ou JPG transparente";
                    toggleModal(modalId); 
                    carregarProdutos(); // Recarrega a tabela na mesma hora!
                    alert("Sucesso! Vinho adicionado ao catálogo.");
                }
            }

            btn.innerText = textoOriginal;
            btn.disabled = false;
        }

        // Bônus: Função para remover o produto se o Theo errar
        async function deletarProduto(id) {
            if(confirm("Tem certeza que deseja apagar este vinho do catálogo?")) {
                await supabase.from('produtos').delete().eq('id', id);
                carregarProdutos(); // Atualiza a tabela
            }
        }
    </script>
</body>
</html>
