<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Allvino - Login Administrativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet"/>
    <style>body { font-family: 'Manrope', sans-serif; }</style>
</head>
<body class="bg-[#111111] min-h-screen flex items-center justify-center p-5">
    <div class="w-full max-w-md bg-[#1a1a1a] border border-stone-800 rounded-3xl p-8 shadow-2xl">
        <div class="flex justify-center mb-8 h-12">
            <img src="LOGO-ALLVINO-BRANCO.png" alt="Allvino Admin" class="h-full object-contain">
        </div>
        
        <h1 class="text-white text-xl font-bold text-center mb-2">Portal da Loja</h1>
        <p class="text-stone-400 text-sm text-center mb-8">Acesso restrito à Gerência e Consultoria de Vendas.</p>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="text-xs font-bold text-stone-400 uppercase tracking-wider block mb-2">E-mail Corporativo</label>
                <input type="email" id="email" placeholder="theo@allvino.com.br" required class="w-full bg-[#0a0a0a] border border-stone-700 text-white rounded-xl py-3 px-4 outline-none focus:border-red-600 transition-colors">
            </div>
            <div>
                <label class="text-xs font-bold text-stone-400 uppercase tracking-wider block mb-2">Senha</label>
                <input type="password" id="password" placeholder="••••••••" required class="w-full bg-[#0a0a0a] border border-stone-700 text-white rounded-xl py-3 px-4 outline-none focus:border-red-600 transition-colors">
            </div>
            
            <button type="submit" id="btnSubmit" class="w-full bg-[#B91C1C] text-white py-4 rounded-xl font-bold text-sm uppercase tracking-widest hover:bg-red-800 transition-colors mt-4 shadow-lg shadow-red-900/20">
                Acessar Painel
            </button>
        </form>

        <p class="text-center text-stone-500 text-xs mt-8 font-medium">Problemas no acesso? Fale com o suporte técnico.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const supabaseUrl = 'https://jfgtafnfuqlysdnvsbhk.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpmZ3RhZm5mdXFseXNkbnZzYmhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDY1NzgsImV4cCI6MjA5MjcyMjU3OH0.mZDnR1A8VIJVUzedb7GU1db628dSqU-8SdvBFXXVaE4';
        
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const form = document.getElementById('loginForm');
        const btn = document.getElementById('btnSubmit');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            btn.innerText = "Verificando...";
            btn.disabled = true;

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                alert("Erro: " + error.message);
                btn.innerText = "Acessar Painel";
                btn.disabled = false;
            } else {
                window.location.href = 'admin.html';
            }
        });
    </script>
</body>
</html>
