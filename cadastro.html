<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Allvino - Criar Conta</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet"/>
    <style>body { background-color: #FDFBF7; font-family: 'Manrope', sans-serif; }</style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-5">
    
    <div class="w-full max-w-sm">
        <div class="flex justify-center mb-8 h-10">
            <img src="LOGO-ALLVINO-PRETO.png" alt="Allvino" class="h-full w-auto object-contain scale-125">
        </div>

        <h1 class="text-2xl font-bold text-black text-center mb-2">Crie sua conta</h1>
        <p class="text-stone-500 text-sm text-center mb-8">Faça parte da nossa adega digital.</p>

        <button type="button" onclick="window.location.href='catalogo.html';" class="w-full bg-white border border-stone-200 text-black py-3.5 px-4 rounded-2xl font-bold text-sm shadow-sm flex items-center justify-center gap-3 hover:bg-stone-50 transition-colors mb-6">
            <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Continuar com o Google
        </button>

        <div class="flex items-center gap-4 mb-6">
            <div class="flex-1 h-px bg-stone-200"></div>
            <span class="text-xs text-stone-400 font-bold uppercase tracking-wider">Ou cadastre-se</span>
            <div class="flex-1 h-px bg-stone-200"></div>
        </div>

        <form onsubmit="event.preventDefault(); window.location.href='catalogo.html';" class="space-y-4">
            <div>
                <input type="text" placeholder="Nome completo" required class="w-full bg-white border border-stone-200 text-black rounded-2xl py-4 px-5 outline-none focus:border-black transition-colors shadow-sm">
            </div>
            <div>
                <input type="email" placeholder="E-mail" required class="w-full bg-white border border-stone-200 text-black rounded-2xl py-4 px-5 outline-none focus:border-black transition-colors shadow-sm">
            </div>
            <div>
                <input type="tel" placeholder="Telefone / WhatsApp" required class="w-full bg-white border border-stone-200 text-black rounded-2xl py-4 px-5 outline-none focus:border-black transition-colors shadow-sm">
            </div>
            <div>
                <input type="password" placeholder="Crie uma senha" required class="w-full bg-white border border-stone-200 text-black rounded-2xl py-4 px-5 outline-none focus:border-black transition-colors shadow-sm">
            </div>

            <label class="flex items-center gap-3 mt-2 cursor-pointer">
                <input type="checkbox" checked class="w-5 h-5 rounded border-stone-300 text-black focus:ring-black">
                <span class="text-sm font-bold text-stone-500">Manter-me conectado</span>
            </label>
            
            <button type="submit" class="w-full bg-black text-white py-4 rounded-2xl font-bold text-lg active:scale-95 transition-transform shadow-xl mt-4">
                Criar Conta
            </button>
        </form>

        <p class="text-center text-sm font-bold text-stone-400 mt-8">
            Já tem uma conta? <a href="login.html" class="text-black hover:underline">Fazer login</a>
        </p>
    </div>

</body>
</html>
