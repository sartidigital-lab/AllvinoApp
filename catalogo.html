<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Allvino - Catálogo</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,300;0,700&family=Manrope:wght@400;700&display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { background-color: #FDFBF7; scroll-behavior: smooth; font-family: 'Manrope', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">
    <header class="bg-white/90 backdrop-blur-md sticky top-0 z-40 border-b border-stone-100 flex justify-between items-center w-full px-5 py-4">
        <button onclick="toggleMenu()" class="p-1"><span class="material-symbols-outlined text-black">menu</span></button>
        <div class="h-10 flex items-center justify-center"><img src="LOGO-ALLVINO-PRETO.png" alt="Allvino" class="h-full w-auto object-contain scale-150 transform origin-center"></div>
        <button onclick="toggleCart()" class="relative p-1">
            <span class="material-symbols-outlined text-black">shopping_bag</span>
            <span id="cart-badge" class="absolute -top-1 -right-1 bg-[#B91C1C] text-white text-[10px] rounded-full w-4 h-4 flex items-center justify-center font-bold hidden border border-white">0</span>
        </button>
    </header>

    <main class="max-w-4xl mx-auto px-5 pt-6">
        <a href="promocao.html" class="relative overflow-hidden rounded-3xl bg-black h-[380px] flex flex-col justify-end p-8 block group shadow-lg">
            <img class="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:scale-105 transition-transform duration-1000" src="https://images.unsplash.com/photo-1572913017567-02f06497ce10?auto=format&fit=crop&w=800" alt="Arkos Vinho Verde">
            <div class="relative z-10 space-y-2">
                <span class="text-[10px] text-white uppercase tracking-widest bg-white/20 px-3 py-1 rounded-full backdrop-blur-sm">Seleção Capixaba</span>
                <h2 class="text-4xl text-white font-bold font-serif">Arkos Vinho Verde</h2>
                <p class="text-white/80 text-sm max-w-xs pb-4">O frescor de Portugal que combina com o clima do nosso estado.</p>
                <div class="bg-white text-black font-bold text-xs px-6 py-3 rounded-full w-fit flex items-center gap-2">APROVEITAR OFERTA <span class="material-symbols-outlined text-sm">arrow_forward</span></div>
            </div>
        </a>

        <div id="vinhos" class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-12">
            <div class="col-span-full py-12 flex flex-col items-center justify-center text-stone-400">
                <span class="material-symbols-outlined text-4xl mb-3 animate-spin">refresh</span>
                <p class="font-bold tracking-widest uppercase text-sm">Carregando a Adega...</p>
            </div>
        </div>
    </main>

    <div id="menu-overlay" class="fixed inset-0 z-[60] flex hidden opacity-0 transition-all duration-300"><div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="toggleMenu()"></div><div id="menu-panel" class="relative w-full max-w-[85%] md:max-w-sm h-full bg-white flex flex-col transform -translate-x-full transition-transform duration-300 ease-out shadow-2xl"><div class="p-6 border-b border-stone-100 flex justify-between items-center bg-[#FDFBF7]"><div class="flex items-center gap-2"><span class="material-symbols-outlined text-black">tune</span><h2 class="text-xl font-bold font-serif text-black">Filtros</h2></div><button onclick="toggleMenu()" class="p-2 hover:bg-stone-200 rounded-full transition-colors flex items-center justify-center"><span class="material-symbols-outlined text-black">close</span></button></div><div class="flex-1 overflow-y-auto p-6 space-y-8 no-scrollbar"><section><h3 class="text-xs font-bold text-stone-400 uppercase tracking-widest mb-4">Origem</h3><div class="flex flex-wrap gap-2"><button class="flex items-center gap-2 px-4 py-2 rounded-full border border-stone-200 bg-white hover:border-black transition text-sm font-bold">🇵🇹 Portugal</button><button class="flex items-center gap-2 px-4 py-2 rounded-full border border-stone-200 bg-white hover:border-black transition text-sm font-bold">🇫🇷 França</button></div></section></div><div class="p-6 border-t border-stone-100 bg-white"><button onclick="toggleMenu()" class="w-full bg-black text-white py-4 rounded-2xl font-bold uppercase tracking-widest active:scale-95 transition shadow-lg">Aplicar Filtros</button></div></div></div>
    <div id="cart-overlay" class="fixed inset-0 z-[60] flex justify-end hidden opacity-0 transition-all duration-300"><div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="toggleCart()"></div><div id="cart-panel" class="relative w-full max-w-md h-full bg-white flex flex-col transform translate-x-full transition-transform duration-300 ease-out shadow-2xl"><div class="p-6 border-b flex justify-between items-center"><h2 class="text-xl font-bold">Sua Seleção</h2><button onclick="toggleCart()" class="p-2 hover:bg-stone-100 rounded-full transition"><span class="material-symbols-outlined">close</span></button></div><div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4 no-scrollbar"></div><div class="p-6 bg-stone-50 border-t space-y-4"><label class="flex items-center justify-between p-4 bg-white rounded-2xl border border-stone-200 cursor-pointer"><div class="flex items-center gap-3"><input type="checkbox" id="retirada" onchange="renderCart()" class="text-[#B91C1C] rounded focus:ring-0"> <span class="font-bold text-sm">Retirada na Loja</span></div><span class="text-xs font-bold text-green-600">-10% OFF</span></label><div class="flex justify-between text-xl font-bold"><span>Total</span> <span id="cart-total">R$ 0,00</span></div><button onclick="location.href='checkout.html'" class="w-full bg-[#B91C1C] text-white py-4 rounded-2xl font-bold shadow-lg shadow-red-900/20 active:scale-95 transition">Ir para Pagamento</button></div></div></div>
    
    <nav class="bg-white/90 backdrop-blur-md fixed bottom-0 left-0 w-full z-40 rounded-t-2xl border-t border-stone-100 shadow-[0_-10px_30px_rgba(0,0,0,0.04)] flex justify-around items-center px-6 pb-6 pt-3"><a class="flex flex-col items-center text-stone-400 hover:text-black transition-colors" href="index.html"><span class="material-symbols-outlined">home</span><span class="text-[10px] uppercase tracking-tighter mt-1 font-bold">Início</span></a><a class="flex flex-col items-center text-[#B91C1C] font-bold" href="catalogo.html"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">apps</span><span class="text-[10px] uppercase tracking-tighter mt-1">Catálogo</span></a><a class="flex flex-col items-center text-stone-400 hover:text-black transition-colors" href="login.html"><span class="material-symbols-outlined">person</span><span class="text-[10px] uppercase tracking-tighter mt-1 font-bold">Conta</span></a></nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // 1. INICIALIZAÇÃO DO BANCO DE DADOS
        const supabaseUrl = 'https://jfgtafnfuqlysdnvsbhk.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpmZ3RhZm5mdXFseXNkbnZzYmhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDY1NzgsImV4cCI6MjA5MjcyMjU3OH0.mZDnR1A8VIJVUzedb7GU1db628dSqU-8SdvBFXXVaE4';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        // 2. FUNÇÃO QUE PUXA OS PRODUTOS REAIS
        async function carregarCatalogo() {
            const container = document.getElementById('vinhos');

            const { data, error } = await supabaseClient
                .from('produtos')
                .select('*')
                .order('criado_em', { ascending: false }); // Pega os mais novos primeiro

            if (error) {
                container.innerHTML = '<p class="col-span-full text-center text-red-500 font-bold py-12">Erro ao carregar o catálogo.</p>';
                return;
            }

            if (!data || data.length === 0) {
                container.innerHTML = '<p class="col-span-full text-center text-stone-400 font-bold py-12">A nossa adega está sendo reabastecida. Volte em breve!</p>';
                return;
            }

            container.innerHTML = ''; // Limpa o "Carregando"

            // Desenha cada vinho puxado do banco
            data.forEach(produto => {
                const imagem = produto.imagem_url || 'https://via.placeholder.com/300x400?text=Sem+Imagem';
                
                // Monta o card em HTML
                const card = `
                    <div class="bg-white p-4 rounded-3xl shadow-sm border border-stone-100 flex flex-col h-full hover:shadow-md transition-shadow">
                        <div class="aspect-[3/4] bg-stone-50 rounded-2xl flex items-center justify-center p-6 mb-4 relative overflow-hidden group">
                            <img src="${imagem}" class="h-full w-full object-contain mix-blend-multiply group-hover:scale-105 transition-transform duration-500" alt="${produto.nome}">
                        </div>
                        <h3 class="font-bold text-xl line-clamp-2">${produto.nome}</h3>
                        <p class="text-xs text-stone-400 font-bold uppercase tracking-widest mt-1">${produto.pais || 'Origem não informada'} • ${produto.tipo || 'Vinho'}</p>
                        
                        <div class="flex justify-between items-end mt-auto pt-5">
                            <span class="text-2xl font-bold">R$ ${produto.preco.toFixed(2).replace('.', ',')}</span>
                            <button onclick="addToCart('${produto.nome}', ${produto.preco}, '${imagem}')" class="bg-black text-white p-3 rounded-2xl active:scale-90 transition hover:bg-stone-800 shadow-sm">
                                <span class="material-symbols-outlined">add_shopping_cart</span>
                            </button>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        // Chama a função assim que a tela abre
        carregarCatalogo();

        // 3. FUNÇÕES DE INTERFACE (MENU E CARRINHO - INTACTAS)
        function toggleMenu() { const o = document.getElementById('menu-overlay'), p = document.getElementById('menu-panel'); if(o.classList.contains('hidden')){ o.classList.remove('hidden'); setTimeout(()=>{ o.classList.remove('opacity-0'); p.classList.remove('-translate-x-full'); },10); } else { o.classList.add('opacity-0'); p.classList.add('-translate-x-full'); setTimeout(()=>o.classList.add('hidden'),300); } }
        let cart = JSON.parse(localStorage.getItem('allvino_cart')) || [];
        function toggleCart() { const o = document.getElementById('cart-overlay'), p = document.getElementById('cart-panel'); if(o.classList.contains('hidden')){ o.classList.remove('hidden'); setTimeout(()=>{ o.classList.remove('opacity-0'); p.classList.remove('translate-x-full'); },10); } else { o.classList.add('opacity-0'); p.classList.add('translate-x-full'); setTimeout(()=>o.classList.add('hidden'),300); } renderCart(); }
        function addToCart(n, p, i) { const item = cart.find(x => x.nome === n); if(item) item.qtd++; else cart.push({nome:n, preco:p, img:i, qtd:1}); localStorage.setItem('allvino_cart', JSON.stringify(cart)); document.getElementById('cart-badge').innerText = cart.reduce((a,b)=>a+b.qtd,0); document.getElementById('cart-badge').classList.remove('hidden'); }
        function renderCart() { const cont = document.getElementById('cart-items'); cont.innerHTML = ''; let sub = 0; cart.forEach((x, i) => { sub += x.preco * x.qtd; cont.innerHTML += `<div class="flex gap-4 items-center border-b pb-4"><img src="${x.img}" class="w-16 h-20 object-contain mix-blend-multiply"><div class="flex-1"><p class="font-bold text-sm">${x.nome}</p><p class="text-xs text-stone-400">R$ ${x.preco.toFixed(2).replace('.', ',')}</p></div><div class="flex items-center gap-2"><button onclick="changeQty(${i},-1)" class="w-6 h-6 border rounded font-bold hover:bg-stone-100">-</button><span class="text-xs font-bold w-4 text-center">${x.qtd}</span><button onclick="changeQty(${i},1)" class="w-6 h-6 border rounded font-bold hover:bg-stone-100">+</button></div></div>`; }); const desc = document.getElementById('retirada').checked ? sub * 0.10 : 0; document.getElementById('cart-total').innerText = `R$ ${(sub - desc).toFixed(2).replace('.', ',')}`; }
        function changeQty(i, d) { cart[i].qtd += d; if(cart[i].qtd <= 0) cart.splice(i,1); localStorage.setItem('allvino_cart', JSON.stringify(cart)); renderCart(); }
        document.addEventListener("DOMContentLoaded", () => { const qtd = cart.reduce((a,b)=>a+b.qtd,0); if(qtd > 0) { document.getElementById('cart-badge').innerText = qtd; document.getElementById('cart-badge').classList.remove('hidden'); } });
    </script>
</body>
</html>
