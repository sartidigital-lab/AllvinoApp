<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Allvino - Catálogo</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,300;0,700&family=Manrope:wght@400;700&display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { background-color: #FDFBF7; scroll-behavior: smooth; font-family: 'Manrope', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .filter-active { border-color: black !important; background-color: #f5f5f5 !important; }
    </style>
</head>
<body class="pb-24">
    <header class="bg-white/90 backdrop-blur-md sticky top-0 z-40 border-b border-stone-100 flex justify-between items-center w-full px-5 py-4">
        <button onclick="toggleMenu()" class="p-1"><span class="material-symbols-outlined text-black">tune</span></button>
        <div class="h-10 flex items-center justify-center"><img src="LOGO-ALLVINO-PRETO.png" alt="Allvino" class="h-full w-auto object-contain scale-150 transform origin-center"></div>
        <button onclick="toggleCart()" class="relative p-1">
            <span class="material-symbols-outlined text-black">shopping_bag</span>
            <span id="cart-badge" class="absolute -top-1 -right-1 bg-[#B91C1C] text-white text-[10px] rounded-full w-4 h-4 flex items-center justify-center font-bold hidden border border-white">0</span>
        </button>
    </header>

    <main class="max-w-4xl mx-auto px-5 pt-6">
        
        <div id="banner-promocional-container">
            </div>

        <div class="flex justify-between items-end mb-6">
            <h1 class="text-3xl font-bold font-serif" id="titulo-pagina">Catálogo</h1>
            <button onclick="resetarFiltros()" id="btn-limpar" class="text-xs font-bold text-red-600 hidden uppercase tracking-widest mb-1 hover:underline">Limpar Filtros</button>
        </div>

        <div id="vinhos" class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-4">
            </div>
    </main>

    <div id="menu-overlay" class="fixed inset-0 z-[60] flex hidden opacity-0 transition-all duration-300">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="toggleMenu()"></div>
        <div id="menu-panel" class="relative w-full max-w-[85%] md:max-w-sm h-full bg-white flex flex-col transform -translate-x-full transition-transform duration-300 ease-out shadow-2xl">
            <div class="p-6 border-b border-stone-100 flex justify-between items-center bg-[#FDFBF7]">
                <div class="flex items-center gap-2"><span class="material-symbols-outlined text-black">tune</span><h2 class="text-xl font-bold font-serif text-black">Filtros</h2></div>
                <button onclick="toggleMenu()" class="p-2 hover:bg-stone-200 rounded-full transition-colors flex items-center justify-center"><span class="material-symbols-outlined text-black">close</span></button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-6 space-y-8 no-scrollbar">
                <section>
                    <h3 class="text-xs font-bold text-stone-400 uppercase tracking-widest mb-4">Faixa de Preço</h3>
                    <div class="flex flex-col gap-2">
                        <button onclick="aplicarFiltroPreco(0, 40, 'Até R$ 40', this)" class="btn-filtro text-left px-4 py-3 rounded-xl border border-stone-200 bg-white text-sm font-bold">Até R$ 40,00</button>
                        <button onclick="aplicarFiltroPreco(40.01, 100, 'R$ 40 a R$ 100', this)" class="btn-filtro text-left px-4 py-3 rounded-xl border border-stone-200 bg-white text-sm font-bold">R$ 40,01 até R$ 100,00</button>
                        <button onclick="aplicarFiltroPreco(100.01, 500, 'R$ 100 a R$ 500', this)" class="btn-filtro text-left px-4 py-3 rounded-xl border border-stone-200 bg-white text-sm font-bold">R$ 100,01 até R$ 500,00</button>
                        <button onclick="aplicarFiltroPreco(500.01, 1000, 'R$ 500 a R$ 1.000', this)" class="btn-filtro text-left px-4 py-3 rounded-xl border border-stone-200 bg-white text-sm font-bold">R$ 500,01 até R$ 1.000,00</button>
                        <button onclick="aplicarFiltroPreco(1000.01, 99999, 'Acima de R$ 1.000', this)" class="btn-filtro text-left px-4 py-3 rounded-xl border border-stone-200 bg-white text-sm font-bold">Acima de R$ 1.000,00</button>
                    </div>
                </section>

                <section>
                    <h3 class="text-xs font-bold text-stone-400 uppercase tracking-widest mb-4">Tipo de Vinho</h3>
                    <div class="flex flex-wrap gap-2" id="filtro-tipos-container">
                        </div>
                </section>

                <section>
                    <h3 class="text-xs font-bold text-stone-400 uppercase tracking-widest mb-4">País</h3>
                    <div class="flex flex-wrap gap-2" id="filtro-paises-container">
                        </div>
                </section>
            </div>
        </div>
    </div>

    <div id="cart-overlay" class="fixed inset-0 z-[60] flex justify-end hidden opacity-0 transition-all duration-300">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="toggleCart()"></div>
        <div id="cart-panel" class="relative w-full max-w-md h-full bg-white flex flex-col transform translate-x-full transition-transform duration-300 ease-out shadow-2xl">
            <div class="p-6 border-b flex justify-between items-center"><h2 class="text-xl font-bold">Sua Seleção</h2><button onclick="toggleCart()" class="p-2 hover:bg-stone-100 rounded-full transition"><span class="material-symbols-outlined">close</span></button></div>
            <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4 no-scrollbar"></div>
            <div class="p-6 bg-stone-50 border-t space-y-4">
                <label class="flex items-center justify-between p-4 bg-white rounded-2xl border border-stone-200 cursor-pointer"><div class="flex items-center gap-3"><input type="checkbox" id="retirada" onchange="renderCart()" class="text-[#B91C1C] rounded focus:ring-0"> <span class="font-bold text-sm">Retirada na Loja</span></div><span class="text-xs font-bold text-green-600">-10% OFF</span></label>
                <div class="flex justify-between text-xl font-bold"><span>Total</span> <span id="cart-total">R$ 0,00</span></div>
                <button onclick="location.href='checkout.html'" class="w-full bg-[#B91C1C] text-white py-4 rounded-2xl font-bold shadow-lg shadow-red-900/20 active:scale-95 transition">Ir para Pagamento</button>
            </div>
        </div>
    </div>
    
    <nav class="bg-white/90 backdrop-blur-md fixed bottom-0 left-0 w-full z-40 rounded-t-2xl border-t border-stone-100 shadow-[0_-10px_30px_rgba(0,0,0,0.04)] flex justify-around items-center px-6 pb-6 pt-3">
        <a class="flex flex-col items-center text-stone-400 hover:text-black transition-colors" href="index.html"><span class="material-symbols-outlined">home</span><span class="text-[10px] uppercase tracking-tighter mt-1 font-bold">Início</span></a>
        <a class="flex flex-col items-center text-[#B91C1C] font-bold" href="catalogo.html"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">apps</span><span class="text-[10px] uppercase tracking-tighter mt-1">Catálogo</span></a>
        <a class="flex flex-col items-center text-stone-400 hover:text-black transition-colors" href="login.html"><span class="material-symbols-outlined">person</span><span class="text-[10px] uppercase tracking-tighter mt-1 font-bold">Conta</span></a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://jfgtafnfuqlysdnvsbhk.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpmZ3RhZm5mdXFseXNkbnZzYmhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDY1NzgsImV4cCI6MjA5MjcyMjU3OH0.mZDnR1A8VIJVUzedb7GU1db628dSqU-8SdvBFXXVaE4';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        let filtroAtual = { tipo: null, coluna: null, valor: null, min: null, max: null, titulo: null };

        // --- CARREGAR BANNER DINÂMICO ---
        async function carregarBanner() {
            const container = document.getElementById('banner-promocional-container');
            const { data, error } = await supabaseClient.from('promocoes').select('*').eq('status', true).order('criado_em', { ascending: false }).limit(1);

            if (error || !data || data.length === 0) {
                container.innerHTML = ''; // Se não tiver banner ativo, não mostra nada
                return;
            }

            const p = data[0];
            container.innerHTML = `
                <a href="promocao.html" class="relative overflow-hidden rounded-3xl bg-black h-[380px] flex flex-col justify-end p-8 block group shadow-lg mb-8">
                    <img class="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:scale-105 transition-transform duration-1000" src="${p.imagem_url}" onerror="this.src='banner-promo.jpg'" alt="${p.titulo}">
                    <div class="relative z-10 space-y-2">
                        <span class="text-[10px] text-white uppercase tracking-widest bg-white/20 px-3 py-1 rounded-full backdrop-blur-sm">Seleção Especial</span>
                        <h2 class="text-4xl text-white font-bold font-serif">${p.titulo}</h2>
                        <p class="text-white/80 text-sm max-w-xs pb-4">${p.subtitulo}</p>
                        <div class="bg-white text-black font-bold text-xs px-6 py-3 rounded-full w-fit flex items-center gap-2">VER PROMOÇÕES <span class="material-symbols-outlined text-sm">arrow_forward</span></div>
                    </div>
                </a>
            `;
        }

        // --- CARREGAR FILTROS DINÂMICOS (Categorias criadas no painel) ---
        async function carregarFiltros() {
            const { data, error } = await supabaseClient.from('categorias').select('*').order('nome');
            if (error || !data) return;

            const contTipos = document.getElementById('filtro-tipos-container');
            const contPaises = document.getElementById('filtro-paises-container');
            contTipos.innerHTML = ''; contPaises.innerHTML = '';

            data.forEach(c => {
                const btnHtml = `<button onclick="aplicarFiltroRapido('${c.tipo}', '${c.nome}', this)" class="btn-filtro px-4 py-2 rounded-full border border-stone-200 bg-white text-sm font-bold">${c.nome}</button>`;
                if (c.tipo === 'tipo') contTipos.innerHTML += btnHtml;
                else if (c.tipo === 'pais') contPaises.innerHTML += btnHtml;
            });
        }

        async function carregarCatalogo() {
            const container = document.getElementById('vinhos');
            container.innerHTML = '<p class="col-span-full text-center py-12 animate-pulse font-bold text-stone-400">FILTRANDO ADEGA...</p>';

            let query = supabaseClient.from('produtos').select('*').order('criado_em', { ascending: false });

            if (filtroAtual.tipo === 'categoria') {
                query = query.eq(filtroAtual.coluna, filtroAtual.valor);
                atualizarCabecalho(filtroAtual.titulo);
            } else if (filtroAtual.tipo === 'preco') {
                query = query.gte('preco', filtroAtual.min).lte('preco', filtroAtual.max);
                atualizarCabecalho(filtroAtual.titulo);
            } else {
                atualizarCabecalho("Catálogo");
            }

            const { data, error } = await query;

            if (error || !data || data.length === 0) {
                container.innerHTML = '<p class="col-span-full text-center text-stone-400 font-bold py-12">Nenhum vinho encontrado nesta seleção.</p>';
                return;
            }

            container.innerHTML = '';
            data.forEach(produto => {
                const imagem = produto.imagem_url || 'https://via.placeholder.com/300x400?text=Sem+Imagem';
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-3xl shadow-sm border border-stone-100 flex flex-col h-full hover:shadow-md transition-shadow">
                        <div class="aspect-[3/4] bg-stone-50 rounded-2xl flex items-center justify-center p-6 mb-4 relative overflow-hidden group">
                            <img src="${imagem}" class="h-full w-full object-contain mix-blend-multiply group-hover:scale-105 transition-transform duration-500" alt="${produto.nome}">
                        </div>
                        <h3 class="font-bold text-xl line-clamp-2">${produto.nome}</h3>
                        <p class="text-xs text-stone-400 font-bold uppercase tracking-widest mt-1">${produto.pais || 'Não informado'} • ${produto.tipo || 'Vinho'}</p>
                        <div class="flex justify-between items-end mt-auto pt-5">
                            <span class="text-2xl font-bold">R$ ${produto.preco.toFixed(2).replace('.', ',')}</span>
                            <button onclick="addToCart('${produto.nome}', ${produto.preco}, '${imagem}')" class="bg-black text-white p-3 rounded-2xl active:scale-90 transition hover:bg-stone-800 shadow-sm">
                                <span class="material-symbols-outlined">add_shopping_cart</span>
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function atualizarCabecalho(titulo) {
            document.getElementById('titulo-pagina').innerText = titulo;
            const btnLimpar = document.getElementById('btn-limpar');
            titulo === "Catálogo" ? btnLimpar.classList.add('hidden') : btnLimpar.classList.remove('hidden');
        }

        function aplicarFiltroRapido(coluna, valor, btn) { filtroAtual = { tipo: 'categoria', coluna: coluna, valor: valor, titulo: valor }; destacarBotao(btn); toggleMenu(); carregarCatalogo(); }
        function aplicarFiltroPreco(min, max, titulo, btn) { filtroAtual = { tipo: 'preco', min: min, max: max, titulo: titulo }; destacarBotao(btn); toggleMenu(); carregarCatalogo(); }
        function destacarBotao(btn) { document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('filter-active')); btn.classList.add('filter-active'); }
        function resetarFiltros() { filtroAtual = { tipo: null }; document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('filter-active')); carregarCatalogo(); }
        function toggleMenu() { document.getElementById('menu-overlay').classList.toggle('hidden'); document.getElementById('menu-overlay').classList.toggle('opacity-0'); document.getElementById('menu-panel').classList.toggle('-translate-x-full'); }
        
        let cart = JSON.parse(localStorage.getItem('allvino_cart')) || [];
        function toggleCart() { const o = document.getElementById('cart-overlay'), p = document.getElementById('cart-panel'); if(o.classList.contains('hidden')){ o.classList.remove('hidden'); setTimeout(()=>{ o.classList.remove('opacity-0'); p.classList.remove('translate-x-full'); },10); } else { o.classList.add('opacity-0'); p.classList.add('translate-x-full'); setTimeout(()=>o.classList.add('hidden'),300); } renderCart(); }
        function addToCart(n, p, i) { const item = cart.find(x => x.nome === n); if(item) item.qtd++; else cart.push({nome:n, preco:p, img:i, qtd:1}); localStorage.setItem('allvino_cart', JSON.stringify(cart)); document.getElementById('cart-badge').innerText = cart.reduce((a,b)=>a+b.qtd,0); document.getElementById('cart-badge').classList.remove('hidden'); alert("Adicionado ao carrinho!");}
        function renderCart() { const cont = document.getElementById('cart-items'); cont.innerHTML = ''; let sub = 0; cart.forEach((x, i) => { sub += x.preco * x.qtd; cont.innerHTML += `<div class="flex gap-4 items-center border-b pb-4"><img src="${x.img}" class="w-16 h-20 object-contain mix-blend-multiply"><div class="flex-1"><p class="font-bold text-sm">${x.nome}</p><p class="text-xs text-stone-400">R$ ${x.preco.toFixed(2).replace('.', ',')}</p></div><div class="flex items-center gap-2"><button onclick="changeQty(${i},-1)" class="w-6 h-6 border rounded font-bold hover:bg-stone-100">-</button><span class="text-xs font-bold w-4 text-center">${x.qtd}</span><button onclick="changeQty(${i},1)" class="w-6 h-6 border rounded font-bold hover:bg-stone-100">+</button></div></div>`; }); const desc = document.getElementById('retirada').checked ? sub * 0.10 : 0; document.getElementById('cart-total').innerText = `R$ ${(sub - desc).toFixed(2).replace('.', ',')}`; }
        function changeQty(i, d) { cart[i].qtd += d; if(cart[i].qtd <= 0) cart.splice(i,1); localStorage.setItem('allvino_cart', JSON.stringify(cart)); renderCart(); document.getElementById('cart-badge').innerText = cart.reduce((a,b)=>a+b.qtd,0); if(cart.length === 0) document.getElementById('cart-badge').classList.add('hidden');}
        
        document.addEventListener("DOMContentLoaded", () => { 
            const qtd = cart.reduce((a,b)=>a+b.qtd,0); if(qtd > 0) { document.getElementById('cart-badge').innerText = qtd; document.getElementById('cart-badge').classList.remove('hidden'); } 
            carregarBanner(); // Inicia o banner dinâmico
            carregarFiltros(); // Puxa os filtros direto do banco de dados
            carregarCatalogo(); // Carrega os vinhos
        });
    </script>
</body>
</html>
